name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          envs: OPENAI_API_KEY
          script: |
            set -e
            cd ~/music-portfolio-ai

            # OPENAI_API_KEYを.envに反映（既存行を更新 or 追加）
            grep -q '^OPENAI_API_KEY=' .env 2>/dev/null \
              && sed -i "s|^OPENAI_API_KEY=.*|OPENAI_API_KEY=${OPENAI_API_KEY}|" .env \
              || echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> .env

            # ディスク容量確保: 未使用イメージ・ビルドキャッシュを全削除
            echo "=== Disk cleanup ==="
            docker image prune -af
            docker builder prune -af
            df -h / | tail -1

            git config pull.rebase false
            git checkout main
            git reset --hard origin/main
            git pull origin main

            # set -e によりビルド失敗時はここで中断される
            docker compose -f docker-compose.production.yml build --no-cache

            docker compose -f docker-compose.production.yml up -d db
            sleep 5
            docker compose -f docker-compose.production.yml run --rm backend \
              bundle exec rails db:migrate
            docker compose -f docker-compose.production.yml up -d --force-recreate nginx
            docker compose -f docker-compose.production.yml up -d
            sleep 15
            curl -f http://localhost/api/v1/health

      - name: Health check
        run: |
          echo "::add-mask::${{ secrets.EC2_HOST }}"
          sleep 10
          STATUS=$(curl -sf "http://${{ secrets.EC2_HOST }}/api/v1/health" 2>/dev/null | jq -r '.status' 2>/dev/null || echo "failed")
          if [ "$STATUS" = "ok" ]; then
            echo "Health check passed!"
          else
            echo "WARNING: Health check did not return ok (status: $STATUS)"
          fi
